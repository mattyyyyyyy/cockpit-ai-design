<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>座舱AI系统架构图</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0e1a;
    font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: auto;
    padding: 20px;
  }
  .container {
    width: 1400px;
  }
  svg {
    width: 100%;
    height: auto;
  }
  /* animations */
  @keyframes flowDown {
    from { stroke-dashoffset: 20; }
    to   { stroke-dashoffset: 0; }
  }
  @keyframes flowUp {
    from { stroke-dashoffset: -20; }
    to   { stroke-dashoffset: 0; }
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.7; }
    50% { opacity: 1; }
  }
  .flow-line {
    stroke-dasharray: 10 5;
    animation: flowDown 1s linear infinite;
  }
  .flow-line-up {
    stroke-dasharray: 10 5;
    animation: flowUp 1s linear infinite;
  }
  .pulse-node {
    animation: pulse 2s ease-in-out infinite;
  }
  .box-hover:hover {
    filter: brightness(1.2);
    cursor: pointer;
  }
</style>
</head>
<body>
<div class="container">
